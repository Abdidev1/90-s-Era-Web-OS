<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90's Era Web OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop" id="desktop">

        <div class="shortcut" data-apps="computer">
            <div class="icon">
                <svg viewBox="0 0 32 32" width="100%" height="100%">
                    <rect x="2" y="4" width="28" height="18" rx="2" fill="#3a82e6" stroke="#fff" stroke-width="1.2"/>
                    <rect x="4" y="6" width="24" height="14" fill="#111"/>
                    <path d="M12 22 L8 28 L24 28 L20 22 Z" fill="#b0b0b0" stroke="#888"/>
                    <rect x="6" y="27" width="20" height="2" fill="#333"/>
                </svg>
            </div>
            <span class="icon-label">Computer</span>
        </div>

        <div class="shortcut" data-apps="explorer">
            <div class="icon">
                <svg viewBox="0 0 32 32" width="100%" height="100%">
                    <path d="M2 6 C2 4, 5 4, 7 4 L12 4 C14 4, 15 6, 17 6 L28 6 C30 6, 30 8, 30 10 L30 26 C30 28, 28 28, 26 28 L4 28 C2 28, 2 26, 2 24 Z" fill="#f5c043" stroke="#d49b1c" stroke-width="1"/>
                    <path d="M4 10 L28 10 L26 26 L6 26 Z" fill="#fce18a"/>
                </svg>
            </div>
            <span class="icon-label">Documents</span>
        </div>

        <div class="shortcut" data-apps="notepad">
            <div class="icon">
                <svg viewBox="0 0 32 32" width="100%" height="100%">
                    <rect x="5" y="3" width="22" height="26" rx="2" fill="#ffffff" stroke-width="1.5"/>
                    <path d="M5 7 L27 7 M5 12 L27 12 M5 17 L22 17 M5 22 L19 22" stroke="#bfbfbf" stroke-width="1.5"/>
                    <path d="M20 15 L26 9 L24 7 L18 13 Z" fill="#3a82e6"/>
                </svg>
            </div>
            <span class="icon-label">Notepad</span>
        </div>

        <div class="shortcut" data-apps="calc">
            <div class="icon">
                <svg viewBox="0 0 32 32" width="100%" height="100%">
                    <rect x="4" y="3" width="24" height="26" rx="3" fill="#4a4a4a" stroke="#b0b0b0" stroke-width="1.5"/>
                    <rect x="7" y="6" width="18" height="6" fill="#8fa93c" rx="1"/>
                    <circle cx="9" cy="16" r="1.5" fill="#bbb"/><circle cx="16" cy="16" r="1.5" fill="#bbb"/><circle cx="23" cy="16" r="1.5" fill="#e65c5c"/>
                    <circle cx="9" cy="21" r="1.5" fill="#bbb"/><circle cx="16" cy="21" r="1.5" fill="#bbb"/><circle cx="23" cy="26" r="1.5" fill="#3a82e6"/>
                </svg>
            </div>
            <span class="icon-label">Calculator</span>
        </div>

    </div>

    <div class="taskbar">
        <button class="start-button" id="startButton" title="Start">
            <div class="start-orb-logo">
                <div class="quad red"></div>
                <div class="quad green"></div>
                <div class="quad blue"></div>
                <div class="quad yellow"></div>
                <div class="orb-gloss"></div>
            </div>
        </button>

        <div class="running-apps" id="taskbarApps"></div>

        <div class="system-tray">
            <div class="tray-net"></div>
            <div class="tray-vol"></div>
        </div>
        <span class="time-display" id="clock">12:00 PM</span>
    </div>

    <div class="start-menu" id="startMenu">
        <div class="start-left">
            <div class="menu-item" data-app="computer">Computer</div>
            <div class="menu-item" data-app="explorer">Documents</div>
            <div class="menu-item" data-app="notepad">Notepad</div>
            <div class="menu-item" data-app="calc">Calculator</div>
            <div class="all-programs-link">All Programs</div>
        </div>
        <div class="start-right">
            <div class="profile-frame">
                <div class="user-avatar-image"></div>
            </div>
            <div class="right-link-item" data-folder="root">Personal Folders</div>
            <div class="right-link-item" data-folder="documents">Documents</div>
            <div class="right-link-item" data-folder="pictures">Pictures</div>
            <div class="right-link-item" data-folder="music">Music</div>
            <hr class="vista-divider">
            <div class="right-link-item">Control Panel</div>
            <div class="right-link-item">Help and Support</div>

            <div class="start-footer-controls">
                <button class="shutdown-lock-btn" title="Lock System"></button>
                <button class="shutdown-power-btn" onclick="location.reload();" title="Shut Down / Restart"></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
